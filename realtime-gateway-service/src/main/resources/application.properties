spring.application.name=realtime-gateway-service

server.port=${REALTIME_GATEWAY_SERVICE_PORT:8095}

# ===============================
# EUREKA SERVICE DISCOVERY
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=realtime-gateway-service-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mobility.realtime.dto

# ===============================
# MANAGEMENT
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# REALTIME CONFIG
# ===============================
realtime.kafka.topics.driver-location-events=driver-location-events
realtime.kafka.topics.assignment-requested-events=assignment-requested
realtime.websocket.endpoint=/ws
realtime.websocket.application-prefix=/app
realtime.websocket.topic-prefix=/topic