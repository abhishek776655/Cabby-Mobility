spring.application.name=auth-service

# ===============================
# EUREKA SERVICE DISCOVERY
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${AUTH_DB:auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

jwt.secret=${JWT_SECRET:mySecretKeyForDevelopmentOnly12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiry-days=${JWT_REFRESH_EXPIRATION:7}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=${AUTH_SERVICE_PORT:8091}