spring.application.name=matchmaking-service

# ===============================
# EUREKA SERVICE DISCOVERY
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

server.port=${MATCHMAKING_SERVICE_PORT:8087}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${MATCHMAKING_DB:matchmaking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Service URLs (use lb:// for Eureka load balancing)
services.location.url=lb://location-service
services.driver.url=lb://driver-service

matchmaking.default-radius-km=5
matchmaking.default-limit=10

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

dispatch.assignment.timeout-seconds=15
dispatch.assignment.max-retries=10
dispatch.reservation.ttl-seconds=15