spring.application.name=matchmaking-service
server.port=8087

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${MATCHMAKING_DB:matchmaking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9092

services.location.url=http://localhost:8086
services.driver.url=http://localhost:8084

matchmaking.default-radius-km=5
matchmaking.default-limit=10

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Dispatch/Assignment config
dispatch.assignment.timeout-seconds=15
dispatch.assignment.max-retries=10
dispatch.reservation.ttl-seconds=15